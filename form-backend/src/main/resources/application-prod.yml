spring:
  main:
    lazy-initialization: true
  mail:
    host: ${MAIL_HOST:-}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:-}
    password: ${MAIL_PASSWORD:-}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  datasource:
    name: "Main Application -- Contact Form Database"
    url: jdbc:h2:file:./data/contact_form_db;AUTO_SERVER=TRUE
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.h2.Driver
    hikari:
      connection-timeout: 80000
      idle-timeout: 30000
      minimum-idle: 10
      maximum-pool-size: 100
      pool-name: "contact-form-pool"
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: update

application:
  contact:
    admin-mail: ${ADMIN_MAIL:-}
  page:
    size: 20

settings:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS}
    max-age: 3600
